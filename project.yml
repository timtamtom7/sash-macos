name: Sash
options:
  bundleIdPrefix: com.sash
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: Sash
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Sash:
    type: application
    platform: macOS
    sources:
      - Sources
      - Resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Sash.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        STOREKit_FILE: "Resources/StoreKit.storekit"
    dependencies:
      - target: SashWidgets
        embed: true
      - sdk: StoreKit.framework
    entitlements:
      path: Resources/Sash.entitlements

  SashWidgets:
    type: app-extension
    platform: macOS
    sources:
      - path: SashWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sash.Sash.SashWidgets
        PRODUCT_NAME: SashWidgets
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
        SKIP_INSTALL: YES
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
    info:
      path: SashWidgets/Info.plist
      properties:
        CFBundleName: SashWidgets
        CFBundleDisplayName: Sash Widgets
        CFBundleIdentifier: com.sash.Sash.SashWidgets
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: XPC!
        CFBundleExecutable: SashWidgets
        LSMinimumSystemVersion: "14.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: SashWidgets/SashWidgets.entitlements
